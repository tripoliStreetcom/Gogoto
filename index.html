<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="GoGOTo - منصة تواصل اجتماعي عصرية">
    <meta name="theme-color" content="#060b14">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>GoGOTo | منصة تواصل اجتماعي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #00ff88;
            --bg: #060b14;
            --surface: #111827;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, .06);
            --grad: linear-gradient(135deg, var(--primary), var(--secondary));
            --glass: rgba(17, 24, 39, .75);
            --radius: 20px;
            --shadow: 0 20px 40px -12px rgba(0, 0, 0, .5);
            --easing: cubic-bezier(0.16, 1, 0.3, 1);
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding-bottom: calc(80px + var(--safe-bottom));
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.6;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 30% 15%, rgba(0, 242, 254, .04) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 70%, rgba(0, 255, 136, .05) 0%, transparent 55%);
            z-index: 0;
            pointer-events: none;
            animation: bgShift 25s infinite;
        }
        @keyframes bgShift {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(1%, -1%); }
            66% { transform: translate(-1%, 1%); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            30% { transform: scale(1.35); }
            60% { transform: scale(.9); }
            100% { transform: scale(1); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.4); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes toastIn {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; transform: translateY(20px); }
            10%, 90% { opacity: 1; transform: translateY(0); }
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .header {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .header h2 {
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.7rem;
            font-weight: 900;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .header-actions {
            display: flex;
            gap: 10px;
        }
        .header-actions i {
            color: var(--accent);
            font-size: 1.4rem;
            padding: 10px;
            border-radius: 14px;
            background: rgba(0, 255, 136, .08);
            cursor: pointer;
            transition: .3s;
            position: relative;
        }
        .header-actions i:hover {
            background: rgba(0, 255, 136, .18);
            transform: scale(1.05);
        }
        .header-actions .has-unread::after {
            content: '';
            position: absolute;
            top: 6px;
            right: 6px;
            width: 10px;
            height: 10px;
            background: #ef4444;
            border-radius: 50%;
            border: 2px solid var(--bg);
            animation: pulse 1.5s infinite;
        }

        .page {
            display: none;
            max-width: 640px;
            margin: auto;
            padding: 14px;
            animation: fadeUp .4s var(--easing);
            position: relative;
            z-index: 1;
        }
        .page.active {
            display: block;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius);
            margin-bottom: 14px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: .3s;
            overflow: hidden;
        }
        .card:hover {
            border-color: rgba(255, 255, 255, .1);
            transform: translateY(-1px);
        }

        .p-head {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .p-head img {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, .1);
        }
        .p-head-info {
            flex: 1;
            min-width: 0;
        }
        .p-head-info b {
            font-size: .95rem;
            color: #fff;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .p-time {
            font-size: .7rem;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .p-text {
            padding: 14px 18px 18px;
            font-size: .9rem;
            white-space: pre-wrap;
            line-height: 1.7;
            color: #cbd5e1;
            word-wrap: break-word;
        }
        .hashtag {
            color: var(--secondary);
            font-weight: 500;
        }
        .mention {
            color: var(--primary);
            font-weight: 500;
        }

        .p-actions {
            padding: 12px 16px;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(255, 255, 255, .04);
            background: rgba(0, 0, 0, .12);
            flex-wrap: wrap;
            gap: 4px;
        }
        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .8rem;
            color: var(--muted);
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            background: transparent;
            border: none;
            transition: .3s;
            white-space: nowrap;
            -webkit-user-select: none;
            user-select: none;
        }
        .action-btn i {
            font-size: 1.1rem;
            transition: .3s;
        }
        .action-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, .04);
        }
        .action-btn:active {
            transform: scale(.9);
        }
        .fa-heart.liked {
            color: #f43f5e;
            animation: heartBeat .4s ease;
        }

        .full-page-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 2000;
            display: none;
            flex-direction: column;
            animation: fadeIn .3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .fp-header {
            padding: 14px 18px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .fp-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            overscroll-behavior: contain;
        }

        .comm-item {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            animation: slideUp .3s;
        }
        .comm-item img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, .1);
            flex-shrink: 0;
        }
        .comm-bubble {
            background: rgba(255, 255, 255, .04);
            padding: 10px 14px;
            border-radius: 4px 16px 16px 16px;
            flex: 1;
            border: 1px solid rgba(255, 255, 255, .05);
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #050912;
            overscroll-behavior: contain;
        }
        .msg-row {
            display: flex;
            gap: 8px;
            max-width: 82%;
            animation: slideUp .3s;
        }
        .msg-row.me {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .msg-row.them {
            align-self: flex-start;
        }
        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, .12);
            flex-shrink: 0;
        }
        .msg-bubble {
            padding: 10px 15px;
            border-radius: 18px;
            font-size: .85rem;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }
        .msg-row.me .msg-bubble {
            background: var(--grad);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 6px 18px rgba(0, 242, 254, .25);
        }
        .msg-row.them .msg-bubble {
            background: #1e293b;
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, .06);
        }
        .msg-time {
            font-size: .65rem;
            color: #64748b;
            margin-top: 3px;
            padding: 0 6px;
        }
        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            border: 2px solid #050912;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        .skeleton {
            background: linear-gradient(90deg, var(--surface) 25%, #1e293b 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
            border-radius: 14px;
        }
        .skeleton-card {
            height: 180px;
            margin-bottom: 14px;
            border-radius: var(--radius);
        }
        .skeleton-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
        }
        .skeleton-line {
            height: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: flex;
            justify-content: space-around;
            padding: 6px 4px var(--safe-bottom);
            border-top: 1px solid var(--border);
            z-index: 1000;
            box-shadow: 0 -8px 30px rgba(0, 0, 0, .4);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: .3s;
            gap: 2px;
        }
        .nav-item i {
            font-size: 1.4rem;
            color: #64748b;
            padding: 8px 12px;
            border-radius: 14px;
            transition: .3s;
        }
        .nav-item span {
            font-size: .65rem;
            color: #64748b;
        }
        .nav-item.active i {
            color: var(--accent);
            background: rgba(0, 255, 136, .1);
            box-shadow: 0 4px 12px rgba(0, 255, 136, .15);
        }
        .nav-item.active span {
            color: var(--accent);
        }
        .plus-icon i {
            font-size: 2rem;
            color: var(--accent);
            background: rgba(0, 255, 136, .12);
            border-radius: 50%;
            padding: 8px 10px;
            box-shadow: 0 6px 20px rgba(0, 255, 136, .25);
        }

        .btn {
            background: var(--grad);
            color: #fff;
            border: none;
            padding: 12px 18px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(0, 242, 254, .3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: .3s;
        }
        .btn:active {
            transform: scale(.96);
            opacity: .85;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            box-shadow: none;
        }
        .btn-outline:hover {
            background: rgba(0, 255, 136, .08);
        }
        .btn-sm {
            padding: 8px 14px;
            font-size: .8rem;
            border-radius: 10px;
        }
        .btn:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        input,
        textarea {
            width: 100%;
            padding: 13px 16px;
            border-radius: 14px;
            background: rgba(0, 0, 0, .35);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, .1);
            outline: none;
            font-size: .9rem;
            font-family: inherit;
            transition: .3s;
        }
        input:focus,
        textarea:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(79, 172, 254, .1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .profile-header {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 16px;
        }
        .cover-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            cursor: pointer;
        }
        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid var(--bg);
            position: absolute;
            bottom: -40px;
            right: 20px;
            object-fit: cover;
            background: var(--surface);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 0, 0, .5);
        }
        .profile-stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }
        .stat-item {
            text-align: center;
            cursor: pointer;
            transition: .3s;
        }
        .stat-item:hover {
            transform: translateY(-2px);
        }
        .stat-item b {
            font-size: 1.2rem;
            display: block;
        }
        .stat-item span {
            font-size: .75rem;
            color: var(--muted);
        }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #64748b;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 14px;
            display: block;
            opacity: .5;
        }
        .empty-state h3 {
            color: var(--muted);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        .empty-state p {
            font-size: .85rem;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 18px;
            z-index: 3000;
            animation: toastIn .3s;
            color: var(--text);
            text-align: center;
            font-weight: 500;
        }
        .install-banner {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--grad);
            color: #fff;
            padding: 16px 20px;
            border-radius: 20px;
            z-index: 3001;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 242, 254, .4);
            animation: fadeInOut 120s infinite;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 90vw;
        }
        .install-banner button {
            background: #fff;
            color: #1e293b;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        .report-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: .7rem;
            transition: .3s;
        }
        .report-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, .1);
        }

        .setting-item {
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, .04);
            cursor: pointer;
            color: #e2e8f0;
            transition: .3s;
        }
        .setting-item:hover {
            background: rgba(255, 255, 255, .03);
        }
        .setting-item i {
            width: 22px;
            font-size: 1.2rem;
            text-align: center;
            color: var(--accent);
        }
        .setting-item:last-child {
            border-bottom: none;
        }

        .login-container {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, #0a1a2f, #020617);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, .8);
            max-width: 380px;
            width: 90%;
            animation: float 4s ease-in-out infinite;
        }
        .login-btn {
            background: #fff;
            color: #1e293b;
            border: none;
            padding: 16px 28px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .3);
            transition: .3s;
            position: relative;
        }
        .login-btn:hover {
            transform: scale(1.02);
        }
        .login-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, .2);
            border-top-color: #1e293b;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            position: absolute;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .login-btn.loading .btn-text {
            visibility: hidden;
        }
        .login-btn.loading .spinner {
            display: inline-block;
        }

        @media (min-width: 768px) {
            .page {
                max-width: 680px;
                padding: 20px;
            }
        }
        @media (min-width: 1024px) {
            .page {
                max-width: 720px;
            }
            .nav {
                max-width: 720px;
                left: 50%;
                transform: translateX(-50%);
                border-radius: 20px 20px 0 0;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: .01ms !important;
                transition-duration: .01ms !important;
            }
        }
    </style>
</head>
<body>
    <div id="app" style="display:none">
        <header class="header">
            <h2 onclick="location.reload()">GoGOTo</h2>
            <div class="header-actions">
                <i class="fa-solid fa-search" onclick="openPage('discover')" title="اكتشف"></i>
                <i class="fa-solid fa-comment-dots" onclick="openPage('chats')" id="chatBell" title="المحادثات"></i>
            </div>
        </header>

        <main>
            <div id="home" class="page active">
                <div style="margin-bottom:14px;position:relative">
                    <i class="fa-solid fa-search" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#888;z-index:1;pointer-events:none"></i>
                    <input id="searchPosts" placeholder="ابحث في المنشورات..." oninput="filterPosts()" style="padding-right:40px" autocomplete="off">
                </div>
                <nav class="stories-container" id="storiesBox" aria-label="القصص"></nav>
                <div id="feed"></div>
            </div>

            <div id="discover" class="page">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        (() => {
            const firebaseConfig = {
                apiKey: "AIzaSyCputZ6t49xHgKG5hzaPgGCl72Vj8yxd_g",
                authDomain: "gogoto-dfbb4.firebaseapp.com",
                databaseURL: "https://gogoto-dfbb4-default-rtdb.firebaseio.com",
                projectId: "gogoto-dfbb4",
                appId: "1:494284825885:web:27600b80e2089703266df4"
            };
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth(), db = firebase.database();
            let user = null, currentChatID = null, selectedTpl = '', currentPostId = null;
            let allPosts = [], storyTimeout, feedListenerRef, deferredPrompt, installInterval;
            window.auth = auth;

            const $ = id => document.getElementById(id);
            function fmt(ms) { const d = new Date(ms); return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')} - ${d.getDate()}/${d.getMonth()+1}`; }
            function esc(str) { if (!str && str !== 0) return ''; const div = document.createElement('div'); div.textContent = String(str); return div.innerHTML; }
            function clean(str) { return String(str || '').replace(/[<>]/g, '').trim(); }
            function isValidURL(str) { try { new URL(str); return true; } catch { return false; } }
            function showToast(msg, dur=3000) { const c=$('toastContainer'); const t=document.createElement('div'); t.className='toast'; t.innerText=msg; c.appendChild(t); setTimeout(()=>{ t.style.animation='toastOut .3s forwards'; setTimeout(()=>t.remove(),300); }, dur); }
            function skeleton(id, n=4) { const el=$(id); if(!el)return; el.innerHTML=Array(n).fill(`<div class="skeleton skeleton-card" style="padding:14px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div class="skeleton skeleton-avatar"></div><div style="flex:1"><div class="skeleton-line" style="width:70%"></div><div class="skeleton-line" style="width:40%"></div></div></div><div class="skeleton-line" style="width:88%"></div><div class="skeleton-line" style="width:72%"></div><div class="skeleton-line" style="width:40%"></div></div>`).join(''); }
            function readFile(file) { return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file); }); }

            function renderTextWithLinks(text) {
                if (!text) return '';
                return esc(text)
                    .replace(/#(\w+)/g, '<a class="hashtag" onclick="searchByHashtag(\'$1\')">#$1</a>')
                    .replace(/@(\w+)/g, '<a class="mention" onclick="goToProfile(\'$1\')">@$1</a>');
            }
            window.searchByHashtag = function(tag) {
                $('searchPosts').value = '#'+tag;
                filterPosts();
            };
            window.goToProfile = function(username) {
                db.ref('users').orderByChild('email').once('value', s => {
                    s.forEach(c => {
                        if (c.val().email && c.val().email.split('@')[0] === username) {
                            loadProfile(c.key);
                            openPage('profile');
                        }
                    });
                });
            };

            function setLoginLoading(loading) {
                const btn = $('googleLoginBtn');
                if (!btn) return;
                if (loading) { btn.classList.add('loading'); btn.disabled = true; }
                else { btn.classList.remove('loading'); btn.disabled = false; }
            }

            window.handleLogin = async function() {
                setLoginLoading(true);
                const errorEl = $('loginError');
                if (errorEl) errorEl.style.display = 'none';
                try {
                    await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                    showToast('تم تسجيل الدخول بنجاح! 🎉');
                } catch (e) {
                    let msg = '';
                    if (e.code === 'auth/popup-closed-by-user') return;
                    else if (e.code === 'auth/unauthorized-domain') msg = 'هذا النطاق غير مصرح به. أضفه إلى Firebase.';
                    else msg = e.message;
                    if (errorEl) { errorEl.innerText = msg; errorEl.style.display = 'block'; }
                    showToast(msg, 5000);
                } finally { setLoginLoading(false); }
            };
            window.login = window.handleLogin;
            window.handleSignOut = () => { if (confirm('تسجيل الخروج؟')) auth.signOut(); };

            auth.onAuthStateChanged(u => {
                if (u) {
                    user = u; $('loginPage').style.display='none'; $('app').style.display='block';
                    const ref = db.ref('users/'+u.uid);
                    ref.update({ name:u.displayName||'مستخدم', pic:u.photoURL||'', email:u.email||'', uid:u.uid, online:true, lastSeen:firebase.database.ServerValue.TIMESTAMP });
                    ref.onDisconnect().update({ online:false, lastSeen:firebase.database.ServerValue.TIMESTAMP });
                    loadFeed(); loadStories(); loadUsers(); checkNotifications();
                } else { $('loginPage').style.display='flex'; $('app').style.display='none'; }
            });

            // ============ NAVIGATION ============
            window.openPage = (id, el) => {
                document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
                const target = $(id); if (target) target.classList.add('active');
                if (el) { document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); }
                if (id==='home') { loadFeed(); loadStories(); }
                if (id==='profile' && user) loadProfile(user.uid);
                if (id==='discover') discoverUsers('');
                if (id==='chats') loadChatList();
                if (id==='notifications') loadNotifications();
            };

            // ============ FOLLOW ============
            window.followUser = async (uid) => { if(!user||uid===user.uid)return; await db.ref(`follows/${user.uid}/following/${uid}`).set(true); await db.ref(`follows/${uid}/followers/${user.uid}`).set(true); addNotif(uid,'بدأ بمتابعتك 👋'); loadProfile(uid); };
            window.unfollowUser = async (uid) => { await db.ref(`follows/${user.uid}/following/${uid}`).remove(); await db.ref(`follows/${uid}/followers/${user.uid}`).remove(); loadProfile(uid); };

            // ============ PROFILE ============
            window.loadProfile = async (uid) => {
                const snap = await db.ref('users/'+uid).once('value'); const u=snap.val()||{};
                const coverBg = u.coverPhoto ? `url(${u.coverPhoto})` : 'linear-gradient(135deg,#1e3a8a,#3b82f6)';
                let html = `<div class="profile-header"><div class="cover-img" style="background:${coverBg};background-size:cover"></div><img src="${u.pic||''}" class="profile-avatar"></div><div style="padding:50px 16px 16px;text-align:center"><h2>${esc(u.name)} ${u.verified?'<i class="fa-solid fa-circle-check" style="color:#4facfe"></i>':''}</h2><p>@${(u.email||'').split('@')[0]}</p><p>${esc(u.bio||'')}</p><div class="profile-stats"><div class="stat-item"><b>${u.postsCount||0}</b><span>منشورات</span></div><div class="stat-item"><b>${u.followersCount||0}</b><span>متابع</span></div><div class="stat-item"><b>${u.followingCount||0}</b><span>يتابع</span></div></div>`;
                if (uid!==user.uid) {
                    const f=await db.ref(`follows/${user.uid}/following/${uid}`).once('value');
                    html += `<button class="btn ${f.exists()?'btn-outline':''}" onclick="${f.exists()?'unfollowUser':'followUser'}('${uid}')">${f.exists()?'إلغاء المتابعة':'متابعة'}</button>`;
                } else html += `<button class="btn btn-outline" onclick="openPage('settings')">تعديل الملف</button>`;
                html += `<hr><h3>📝 المنشورات</h3>`;
                const postsSnap = await db.ref('posts').once('value'); let ph=''; const arr=[];
                postsSnap.forEach(c=>{ if(c.val().uid===uid) arr.push({id:c.key,...c.val()}); });
                arr.sort((a,b)=> (b.pinned?1:0) - (a.pinned?1:0) || b.time - a.time);
                arr.forEach(p=>ph+=createPostHTML(p.id,p,true));
                $('profileContent').innerHTML = html + (ph||'<div class="empty-state">لا منشورات</div>');
            };
            window.editBio = async () => { const cur = (await db.ref('users/'+user.uid+'/bio').once('value')).val()||''; const n=prompt('النبذة:',cur); if(n!==null){ await db.ref('users/'+user.uid+'/bio').set(clean(n)); showToast('تم التحديث'); loadProfile(user.uid); } };

            // ============ DISCOVER ============
            window.discoverUsers = async (val) => {
                const term=clean(val).toLowerCase(); const snap=await db.ref('users').once('value'); let html='', cnt=0;
                snap.forEach(c=>{ const u=c.val(); if(!u.name||u.uid===user.uid)return; if(term&&!u.name.toLowerCase().includes(term))return; cnt++; html+=`<div class="card" style="padding:14px;display:flex;gap:12px;cursor:pointer" onclick="loadProfile('${u.uid}');openPage('profile')"><img src="${u.pic}" style="width:48px;height:48px;border-radius:50%"><div><b>${esc(u.name)}</b><p>@${(u.email||'').split('@')[0]}</p></div></div>`; });
                $('discoverResults').innerHTML=cnt?html:'<div class="empty-state">لا مستخدمين</div>';
            };

            // ============ CHAT LIST ============
            window.loadChatList = async () => {
                const term=clean($('chatSearch')?.value||'').toLowerCase(); const snap=await db.ref('users').once('value');
                let html='', cnt=0; const users=[];
                snap.forEach(c=>{ const u=c.val(); if(!u.name||u.uid===user.uid)return; if(term&&!u.name.toLowerCase().includes(term))return; users.push(u); cnt++; });
                users.sort((a,b)=>(b.online?1:0)-(a.online?1:0));
                users.forEach(u=>{ html+=`<div class="card" style="padding:14px;display:flex;gap:12px;cursor:pointer" onclick="startChat('${u.uid}','${esc(u.name)}','${u.pic}')"><img src="${u.pic}" style="width:48px;height:48px;border-radius:50%"><div><b>${esc(u.name)}</b><p>${u.online?'متصل':'غير متصل'}</p></div></div>`; });
                $('chatList').innerHTML=cnt?html:'<div class="empty-state">لا محادثات</div>';
            };
            window.filterChats = () => loadChatList();

            // ============ CHAT WINDOW ============
            window.startChat = (id,name,pic) => {
                currentChatID=user.uid<id?`${user.uid}_${id}`:`${id}_${user.uid}`;
                $('cName').innerText=name; $('cPic').src=pic; $('chatWin').style.display='flex';
                db.ref('users/'+id).on('value',snap=>{ const u=snap.val(); $('cOnline').style.display=u?.online?'block':'none'; $('cStatus').innerText=u?.online?'متصل':(u?.lastSeen?'آخر ظهور '+fmt(u.lastSeen):''); });
                db.ref('chats/'+currentChatID).on('value',s=>{ const box=$('msgBox'); box.innerHTML=''; if(!s.exists()){ box.innerHTML='<div style="text-align:center;margin-top:60px">قل مرحباً لـ '+esc(name)+' 👋</div>'; return; } s.forEach(m=>{ const msg=m.val(); box.innerHTML+=`<div class="msg-row ${msg.uid===user.uid?'me':'them'}"><img src="${msg.uid===user.uid?user.photoURL:pic}" class="msg-avatar"><div><div class="msg-bubble">${esc(msg.text)}</div><div class="msg-time">${fmt(msg.time)}</div></div></div>`; }); box.scrollTop=box.scrollHeight; });
            };
            window.closeChat = () => { $('chatWin').style.display='none'; };
            window.sendMsg = () => { const t=clean($('msgInp').value); if(t&&currentChatID){ db.ref('chats/'+currentChatID).push({ uid:user.uid, text:t, time:firebase.database.ServerValue.TIMESTAMP }); $('msgInp').value=''; } };

            // ============ POSTS ============
            function loadFeed() {
                if (feedListenerRef) db.ref('posts').off('value', feedListenerRef);
                skeleton('feed',4);
                feedListenerRef = db.ref('posts').on('value', s => {
                    allPosts = [];
                    if (s.exists()) s.forEach(c => allPosts.push({ id: c.key, ...c.val() }));
                    allPosts.sort((a,b) => ((Object.keys(b.likes||{}).length + Object.keys(b.comments||{}).length*2) * (b.time||0)) - ((Object.keys(a.likes||{}).length + Object.keys(a.comments||{}).length*2) * (a.time||0)));
                    renderFeed(allPosts);
                });
            }
            function renderFeed(posts) {
                const feed=$('feed');
                if (!posts.length) { feed.innerHTML='<div class="empty-state"><i class="fa-regular fa-newspaper"></i><h3>لا منشورات</h3></div>'; return; }
                feed.innerHTML = posts.map(p => createPostHTML(p.id, p)).join('');
            }
            function createPostHTML(pid, p, isProfile=false) {
                const likes = p.likes ? Object.keys(p.likes).length : 0;
                const comms = p.comments ? Object.keys(p.comments).length : 0;
                const isLiked = user && p.likes && p.likes[user.uid];
                const isSaved = user && p.saved && p.saved[user.uid];
                const isOwner = user && p.uid === user.uid;
                const deleteBtn = isOwner ? `<button class="report-btn" onclick="deletePost('${pid}')"><i class="fa-solid fa-trash"></i></button>` : '';
                const editBtn = isOwner ? `<button class="report-btn" onclick="editPost('${pid}')"><i class="fa-solid fa-pen-to-square"></i></button>` : '';
                const reportBtn = !isOwner ? `<button class="report-btn" onclick="reportPost('${pid}')"><i class="fa-solid fa-flag"></i></button>` : '';
                const pinIcon = p.pinned ? '<i class="fa-solid fa-thumbtack" style="color:var(--accent);margin-left:4px"></i>' : '';
                return `<div class="card" id="post-${pid}">
                    <div class="p-head"><img src="${p.pic||''}" onerror="this.src='data:image/svg+xml,...'"><div class="p-head-info"><b>${pinIcon}${esc(p.author)}</b><span class="p-time">${fmt(p.time)}</span></div>${editBtn}${deleteBtn}${reportBtn}</div>
                    <div class="p-text">${renderTextWithLinks(p.text)}${p.location?`<div><i class="fa-solid fa-location-dot"></i> ${esc(p.location)}</div>`:''}</div>
                    ${p.imageUrl && isValidURL(p.imageUrl) ? `<img src="${p.imageUrl}" style="width:100%;max-height:350px;object-fit:cover" onerror="this.style.display='none'">` : ''}
                    <div class="p-actions">
                        <button class="action-btn like-btn" data-pid="${pid}" onclick="toggleLike('${pid}')"><i class="fa-heart ${isLiked?'fa-solid liked':'fa-regular'}"></i> ${likes}</button>
                        <button class="action-btn" onclick="openComments('${pid}')"><i class="fa-regular fa-comment"></i> ${comms}</button>
                        <button class="action-btn" onclick="sharePost('${pid}')"><i class="fa-solid fa-share-nodes"></i></button>
                        <button class="action-btn" onclick="savePost('${pid}')"><i class="fa-bookmark ${isSaved?'fa-solid':'fa-regular'}"></i></button>
                        <button class="action-btn" onclick="repostPost('${pid}')"><i class="fa-solid fa-retweet"></i></button>
                        ${isOwner ? `<button class="action-btn" onclick="pinPost('${pid}')"><i class="fa-solid fa-thumbtack"></i></button>` : ''}
                    </div>
                </div>`;
            }
            window.toggleLike = function(pid) {
                if (!user) return showToast('سجل الدخول');
                const post = allPosts.find(p => p.id === pid);
                const ref = db.ref(`posts/${pid}/likes/${user.uid}`);
                ref.once('value', s => {
                    if (s.exists()) { ref.remove(); if (post && post.likes) delete post.likes[user.uid]; }
                    else { ref.set(true); if (post && !post.likes) post.likes = {}; post.likes[user.uid] = true; if (post && post.uid !== user.uid) addNotif(post.uid, 'أعجب بمنشورك ❤️'); }
                    if (post) {
                        const likes = post.likes ? Object.keys(post.likes).length : 0;
                        document.querySelectorAll(`.like-btn[data-pid="${pid}"]`).forEach(btn => {
                            btn.querySelector('i').className = `fa-heart ${user && post.likes && post.likes[user.uid] ? 'fa-solid liked' : 'fa-regular'}`;
                            btn.querySelector('span').textContent = likes;
                        });
                    }
                });
            };
            window.openComments = pid => {
                currentPostId = pid; $('commentsPage').style.display = 'flex';
                db.ref(`posts/${pid}`).once('value', s => { if (s.exists()) $('mainPostView').innerHTML = createPostHTML(pid, s.val(), true); });
                db.ref(`posts/${pid}/comments`).on('value', s => {
                    const list = $('commentsList');
                    if (!s.exists()) { list.innerHTML = '<div class="empty-state">لا تعليقات</div>'; return; }
                    list.innerHTML = ''; s.forEach(c => { const cm = c.val(); list.innerHTML += `<div class="comm-item"><img src="${cm.pic}" onerror="..."><div class="comm-bubble"><b>${cm.author}</b><p>${cm.text}</p><small>${fmt(cm.time)}</small></div></div>`; });
                    list.scrollTop = list.scrollHeight;
                });
            };
            window.closeComments = () => $('commentsPage').style.display = 'none';
            window.sendComment = () => {
                const t = clean($('newCommTxt').value); if (!t || !currentPostId) return;
                db.ref(`posts/${currentPostId}/comments`).push({ author: user.displayName, pic: user.photoURL, text: t, time: Date.now() });
                db.ref(`posts/${currentPostId}`).once('value', s => { if (s.val().uid !== user.uid) addNotif(s.val().uid, `علق: "${t.substring(0,20)}"`); });
                $('newCommTxt').value = '';
            };
            window.publishPost = async () => {
                const txt = clean($('pTxt').value); if (!txt) return showToast('اكتب شيئاً');
                await db.ref('posts').push({ uid: user.uid, author: user.displayName, pic: user.photoURL, text: txt, template: selectedTpl, imageUrl: window._postImage || null, location: clean($('postLocation')?.value || ''), time: firebase.database.ServerValue.TIMESTAMP });
                $('pTxt').value = ''; window._postImage = null; selectedTpl = ''; showToast('تم النشر'); openPage('home', document.querySelector('.nav-item'));
                db.ref('users/' + user.uid + '/postsCount').transaction(c => (c||0)+1);
            };
            window.editPost = async (pid) => {
                const snap = await db.ref('posts/' + pid).once('value');
                if (!snap.exists() || snap.val().uid !== user.uid) return;
                const p = snap.val();
                const newText = prompt('تعديل المنشور:', p.text);
                if (newText !== null) {
                    await db.ref('posts/' + pid + '/text').set(clean(newText));
                    showToast('تم التعديل');
                }
            };
            window.setTpl = t => selectedTpl = t;
            window.filterPosts = () => { const term = clean($('searchPosts')?.value || '').toLowerCase(); renderFeed(term ? allPosts.filter(p => (p.text||'').toLowerCase().includes(term)) : allPosts); };
            window.sharePost = pid => { const url = `${location.origin}?post=${pid}`; if (navigator.share) navigator.share({ url }); else prompt('رابط:', url); };
            window.savePost = pid => { if (!user) return; const ref = db.ref(`posts/${pid}/saved/${user.uid}`); ref.once('value', s => s.exists() ? ref.remove() : ref.set(true)); };
            window.deletePost = pid => { if (confirm('حذف؟')) { db.ref('posts/' + pid).remove(); db.ref('users/' + user.uid + '/postsCount').transaction(c => Math.max((c||1)-1, 0)); } };
            window.reportPost = pid => { if (!user) return; db.ref(`posts/${pid}/reports/${user.uid}`).set(true); db.ref(`posts/${pid}/reports`).once('value', s => { if (s.numChildren() >= 50) { db.ref('posts/' + pid).remove(); showToast('حذف تلقائي'); } }); };
            window.repostPost = pid => {
                db.ref(`posts/${pid}`).once('value', s => {
                    if (!s.exists()) return;
                    const p = s.val();
                    db.ref('posts').push({ uid: user.uid, author: user.displayName, pic: user.photoURL, text: `♻️ إعادة نشر: ${p.text}`, time: firebase.database.ServerValue.TIMESTAMP });
                    showToast('تمت إعادة النشر');
                });
            };
            window.pinPost = async (pid) => {
                const snap = await db.ref('posts/' + pid).once('value');
                if (!snap.exists() || snap.val().uid !== user.uid) return;
                const isPinned = snap.val().pinned;
                await db.ref('posts/' + pid + '/pinned').set(!isPinned);
                showToast(isPinned ? 'تم إلغاء التثبيت' : 'تم التثبيت');
            };

            // ============ STORIES ============
            window.addStory = () => { const t = prompt('حالتك:'); if (t) db.ref('stories').push({ uid: user.uid, author: user.displayName, pic: user.photoURL, text: t, time: Date.now() }); };
            function loadStories() { db.ref('stories').limitToLast(15).on('value', s => { let h = `<div class="story-item" onclick="addStory()"><div class="story-img-wrap add-story-wrap"><i class="fa-solid fa-plus"></i></div><div class="story-name">إضافتي</div></div>`; s.forEach(c => { const st = c.val(); h += `<div class="story-item" onclick="viewStory('${esc(st.author)}','${st.pic}','${esc(st.text)}')"><div class="story-img-wrap"><img src="${st.pic}" class="story-img"></div><div class="story-name">${st.author}</div></div>`; }); $('storiesBox').innerHTML = h; }); }
            window.viewStory = (name, pic, text) => { /* ... */ };
            window.closeStory = () => {};

            // ============ NOTIFICATIONS ============
            function addNotif(uid, msg) { if (uid === user.uid) return; db.ref(`notifications/${uid}`).push({ from: user.displayName, pic: user.photoURL, message: msg, time: firebase.database.ServerValue.TIMESTAMP, read: false }); }
            function loadNotifications() { db.ref(`notifications/${user.uid}`).on('value', s => { const list = $('notifList'); if (!s.exists()) { list.innerHTML = '<div class="empty-state">لا إشعارات</div>'; return; } const arr = []; s.forEach(c => arr.push(c.val())); arr.reverse(); list.innerHTML = arr.map(n => `<div class="notif-item"><img src="${n.pic}" style="width:44px;height:44px;border-radius:50%"><div><b>${n.from}</b> ${n.message}</div></div>`).join(''); }); }
            function checkNotifications() { db.ref(`notifications/${user.uid}`).on('value', s => { const bell = $('chatBell'); if (s.exists()) { let unread = false; s.forEach(c => { if (c.val().read === false) unread = true; }); bell.classList.toggle('has-unread', unread); } }); }

            // ============ IMAGES ============
            window.handlePostImage = async input => { if (input.files[0]) window._postImage = await readFile(input.files[0]); };
            window.handleAvatar = async input => { if (input.files[0]) { const data = await readFile(input.files[0]); await db.ref('users/' + user.uid + '/pic').set(data); showToast('تم تحديث الصورة'); loadProfile(user.uid); } };
            window.handleCover = async input => { if (input.files[0]) { const data = await readFile(input.files[0]); await db.ref('users/' + user.uid + '/coverPhoto').set(data); showToast('تم تحديث الغلاف'); loadProfile(user.uid); } };

            // ============ LEGAL ============
            window.showLegal = type => {
                $('legalModal').style.display = 'flex';
                $('legalTitle').innerText = { privacy: 'الخصوصية', terms: 'الشروط', about: 'عن المنصة' }[type] || '';
                $('legalContent').innerHTML = type === 'privacy' ? '<p>خصوصيتك تهمنا...</p>' : type === 'terms' ? '<p>شروط الاستخدام...</p>' : '<p>GoGOTo منصة تواصل اجتماعي...</p>';
            };
            window.closeLegal = () => $('legalModal').style.display = 'none';

            // ============ PWA ============
            function showInstallBanner() { if (document.querySelector('.install-banner')) return; const b = document.createElement('div'); b.className = 'install-banner'; b.innerHTML = '📲 ثبّت التطبيق <button onclick="installApp()">تثبيت</button>'; document.body.appendChild(b); }
            window.installApp = () => { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(r => { if (r.outcome === 'accepted') showToast('تم التثبيت!'); deferredPrompt = null; }); } else showToast('للتثبيت: القائمة ➜ أضف للشاشة الرئيسية'); };
            window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; showInstallBanner(); if (installInterval) clearInterval(installInterval); installInterval = setInterval(() => { const b = document.querySelector('.install-banner'); if (b) b.remove(); setTimeout(showInstallBanner, 120000); }, 240000); });
            window.addEventListener('appinstalled', () => { const b = document.querySelector('.install-banner'); if (b) b.remove(); if (installInterval) clearInterval(installInterval); showToast('تم التثبيت بنجاح!'); });
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent("self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match('/offline.html'))));"));

            const params = new URLSearchParams(location.search);
            if (params.has('post')) setTimeout(() => { const pid = params.get('post'); if (pid) openComments(pid); }, 1000);

            function loadUsers() { discoverUsers(''); }
        })();
    </script>
</body>
</html>
